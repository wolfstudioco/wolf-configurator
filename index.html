  :root{
    --ink:#141414;
    --ink-soft:#4a4a4a;
    --ink-faint:#8a8a8a;
    --paper:#f6f5f2;
    --card:#ffffff;
    --line:#e2e0da;
    --line-strong:#cbc8c0;
    --accent:#1d1d1b;
    --radius:2px;
    --maxw:1080px;
  }

  *{box-sizing:border-box;}

  html,body{margin:0;padding:0;}

  body{
    font-family:"Rajdhani","Helvetica Neue",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    background:var(--paper);
    color:var(--ink);
    font-size:15px;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    letter-spacing:0.01em;
  }

  .wrap{
    max-width:var(--maxw);
    margin:0 auto;
    padding:40px 32px 96px;
  }

  /* ---------- Header ---------- */
  header{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:24px;
    padding-bottom:24px;
    border-bottom:1px solid var(--line-strong);
    flex-wrap:wrap;
  }

  .brand{
    display:flex;
    flex-direction:column;
    gap:2px;
  }

  .logo{
    font-weight:700;
    font-size:22px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--ink);
    line-height:1;
  }
  .logo span{font-weight:300;color:var(--ink-faint);}

  .doc-title{
    font-size:13px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin-top:10px;
    font-weight:500;
  }

  .region-block{
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    gap:6px;
    min-width:240px;
  }

  label.field-label{
    font-size:10.5px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--ink-faint);
    font-weight:600;
  }

  select,input[type="number"]{
    font-family:inherit;
    font-size:14px;
    color:var(--ink);
    background:var(--card);
    border:1px solid var(--line-strong);
    border-radius:var(--radius);
    padding:9px 11px;
    outline:none;
    transition:border-color .15s ease;
    letter-spacing:0.01em;
  }
  select:focus,input[type="number"]:focus{border-color:var(--accent);}

  .region-block select{min-width:260px;}

  /* ---------- Intro note ---------- */
  .note-lead{
    font-size:12px;
    line-height:1.55;
    color:var(--ink-faint);
    max-width:640px;
    margin:20px 0 8px;
    letter-spacing:0.015em;
  }
  .note-tier{
    font-size:12px;
    line-height:1.55;
    color:var(--ink-faint);
    max-width:640px;
    margin:0 0 34px;
    letter-spacing:0.015em;
  }
  .note-tier em{color:var(--ink-soft);font-style:italic;}

  .tier-ref{
    max-width:780px;
    margin:0 0 34px;
    border:1px solid var(--line);
    border-radius:var(--radius);
    background:var(--card);
  }
  .tier-ref summary{
    cursor:pointer;
    padding:12px 16px;
    font-size:10.5px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    font-weight:600;
    color:var(--ink-soft);
    list-style:none;
    user-select:none;
  }
  .tier-ref summary::-webkit-details-marker{display:none;}
  .tier-ref summary::after{content:"+";float:right;color:var(--ink-faint);font-size:14px;line-height:1;}
  .tier-ref[open] summary::after{content:"–";}
  #tierRefBody{padding:2px 16px 14px;}
  .tr-sys{padding:11px 0;border-top:1px solid var(--line);}
  .tr-sys:first-child{border-top:none;}
  .tr-title{
    font-size:11px;font-weight:600;color:var(--ink);
    letter-spacing:0.02em;margin-bottom:8px;
  }
  .tr-row{display:grid;grid-template-columns:118px 1fr;gap:12px;padding:3px 0;align-items:baseline;}
  .tr-tier{
    font-size:9.5px;letter-spacing:0.1em;text-transform:uppercase;
    color:var(--ink-faint);font-weight:600;
  }
  .tr-def{font-size:11.5px;line-height:1.5;color:var(--ink-soft);letter-spacing:0.015em;}
  @media (max-width:820px){
    .tr-row{grid-template-columns:1fr;gap:1px;padding:5px 0;}
  }

  /* ---------- Line items ---------- */
  .lines-head{
    display:grid;
    grid-template-columns:56px 1fr 82px 148px 178px 138px 34px;
    gap:12px;
    padding:0 4px 10px;
    border-bottom:1px solid var(--line);
    align-items:end;
  }
  .lines-head span{
    font-size:10px;
    letter-spacing:0.15em;
    text-transform:uppercase;
    color:var(--ink-faint);
    font-weight:600;
  }
  .lines-head .num{text-align:right;}

  #lines{list-style:none;margin:0;padding:0;}

  .line{
    padding:13px 4px 15px;
    border-bottom:1px solid var(--line);
    background:transparent;
  }
  .line:hover{background:rgba(0,0,0,0.012);}

  .line-row{
    display:grid;
    grid-template-columns:56px 1fr 82px 148px 178px 138px 34px;
    gap:12px;
    align-items:center;
  }

  .line select,.line input{width:100%;}

  /* Per-line schematic (dimension-scaled) */
  .thumb{
    position:relative;
    width:56px;height:42px;
    display:flex;align-items:center;justify-content:center;
    border:1px solid var(--line);
    border-radius:var(--radius);
    background:var(--card);
    overflow:hidden;
  }
  .thumb-art{display:flex;width:100%;height:100%;}
  .thumb svg{
    width:100%;height:100%;
    stroke:var(--ink);stroke-width:2;fill:none;
    stroke-linecap:round;stroke-linejoin:round;
  }
  .thumb svg .dot{fill:var(--ink-faint);stroke:none;}
  .thumb svg .soft{fill:rgba(20,20,20,0.05);stroke:none;}
  .thumb-x{
    position:absolute;right:2px;bottom:1px;
    font-size:9px;font-weight:700;color:var(--ink-soft);
    letter-spacing:0.02em;line-height:1;
    background:rgba(255,255,255,0.85);padding:0 2px;border-radius:2px;
  }

  /* Unit-price field (editable rate) */
  .rate-wrap{
    display:flex;
    align-items:center;
    gap:1px;
    border:1px solid var(--line-strong);
    border-radius:var(--radius);
    background:var(--card);
    padding:0 9px;
    transition:border-color .15s ease;
  }
  .rate-wrap:focus-within{border-color:var(--accent);}
  .rate-wrap.custom{border-color:var(--accent);box-shadow:inset 2px 0 0 var(--accent);}
  .rate-cur{font-size:14px;color:var(--ink-soft);}
  .rate-wrap .rate-input{
    border:none;
    background:transparent;
    padding:8px 2px;
    width:100%;
    font-size:14px;
    text-align:left;
    font-variant-numeric:tabular-nums;
    letter-spacing:0.01em;
  }
  .rate-wrap .rate-input:focus{outline:none;}
  .rate-input::-webkit-outer-spin-button,
  .rate-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
  .rate-input{-moz-appearance:textfield;}
  .rate-unit{
    font-size:11.5px;
    color:var(--ink-faint);
    white-space:nowrap;
    letter-spacing:0.03em;
  }
  .rate-reset{
    border:none;
    background:none;
    cursor:pointer;
    color:var(--ink-faint);
    font-size:13px;
    line-height:1;
    padding:2px 0 2px 4px;
    display:none;
  }
  .rate-wrap.custom .rate-reset{display:inline-block;}
  .rate-reset:hover{color:var(--ink);}
  .ld-custom{color:var(--accent);font-weight:600;}
  .ld-note{

    color:var(--ink-faint);font-weight:600;

    .note-lead{margin:14px 0 22px;}
    .lines-head{display:grid;grid-template-columns:1fr 58px 108px 122px 118px;gap:10px;}
    .lines-head .act-col{display:none;}
    .line{page-break-inside:avoid;padding:10px 2px;}
    .line-row{
      grid-template-columns:1fr 58px 108px 122px 118px;
      gap:10px;
    }
    .line-row .remove{display:none;}
    .thumb{display:none !important;}
    .line select,.line input{

      font-size:11pt;color:#000;

    .rate-wrap{border:none;padding:0;box-shadow:none;}

    .rate-reset{display:none !important;}
    .rate-cur,.rate-unit{color:#000;}
    .line-detail{margin-top:5px;max-width:100%;}
    .ld-tier{display:none;}
    .ld-desc{font-size:9pt;color:#444;line-height:1.4;}
    .m-label{display:none;}
    .field{display:contents;}
    .print-only{display:block;}
    .totals{border-top:1.5px solid #000;}
    .install-note,.total-row .value,.total-row .label{color:#000;}
    .set{page-break-inside:avoid;border:1px solid #000;background:#fff;margin:12px 0;}
    .set-head,.set-foot{background:#fff;}
    .set-name{border:none;background:none;color:#000;padding:2px 0;font-size:12pt;}
    .set-qty{border:none;background:none;color:#000;-webkit-appearance:none;appearance:none;}
    .set-total-row .set-subtotal,.set-unit-row,.set-badge{color:#000;}
    .seg{border:none;}
    .seg-btn{display:none !important;padding:0;}
    .seg-btn.active{display:inline !important;background:none;color:#000;font-weight:600;}
    .lc-label{color:#000;}
  }

/* Pick the right tier-definition set for a category. */
function tierDefFor(cat){
  if(cat.name === "Base cabinets" || cat.name === "Wall cabinets") return TIER_DEF_CABINET;
  if(cat.group === "Doors") return TIER_DEF_DOOR;
  if(cat.group === "Metalwork") return TIER_DEF_METAL;
  if(cat.group === "Upholstery") return TIER_DEF_UPHOLSTERY;
  if(cat.group === "Restaurant Furniture"){
    if(TABLE_SHAPES[cat.shape]) return TIER_DEF_REST_TABLE;
    if(cat.shape === "chair") return TIER_DEF_REST_SEAT;
    return TIER_DEF_UPHOLSTERY;
  }
  return cat.matFixed ? TIER_DEF_FIXED : TIER_DEF_OPEN;
}

/* Natural-language unit suffix for the sell-band line. */
function bandUnit(u){
  if(u==="LF") return "/LF";
  if(u==="SF") return "/SF";
  if(u==="EA") return " each";
  if(u==="EA (pair)") return " per pair";
  if(u==="pair") return " per pair";
  if(u==="per room") return " per room";
  return "/"+u;
}

  if(u==="EA (pair)") return "/pair";
  if(u==="pair") return "/pair";

}

/* ---------- Build a category <select> grouped by group ---------- */
function buildCategorySelect(){
  const sel = document.createElement("select");
  sel.className = "cat-select";
  const groups = {};
  CATEGORIES.forEach((c,idx)=>{
    if(!groups[c.group]){
      const og = document.createElement("optgroup");
      og.label = c.group;
      groups[c.group] = og;
      sel.appendChild(og);
    }
    const o = document.createElement("option");
    o.value = idx;
    o.textContent = c.name;
    groups[c.group].appendChild(o);
  });
  return sel;
}

/* ---------- Build a tier <select> for a given category ---------- */
function buildTierSelect(catIdx, current){
  const cat = CATEGORIES[catIdx];
  const sel = document.createElement("select");
  sel.className = "tier-select";
  TIER_ORDER.forEach(t=>{
    if(cat.tiers[t] === undefined) return;
    const o = document.createElement("option");
    o.value = t;
    o.textContent = t;
    sel.appendChild(o);
  });
  // keep current tier if still valid, else default to Standard/first
  if(current && cat.tiers[current] !== undefined){
    sel.value = current;
  } else if(cat.tiers["Standard"] !== undefined){
    sel.value = "Standard";
  }
  return sel;
}

/* ---------- Per-line schematic engine ---------- */
function segByLF(qty, per, min, max){
  const n = Math.round((parseFloat(qty)||0)/per);
  return Math.max(min, Math.min(max, n||min));
}
function svgWrap(inner){
  return '<svg viewBox="0 0 100 72" preserveAspectRatio="xMidYMid meet">'+inner+'</svg>';
}

  const catWrap = document.createElement("div");

  const catSel = buildCategorySelect();

  qtyWrap.className = "field qty";
  const mlQty = document.createElement("span"); mlQty.className="m-label"; mlQty.textContent="Qty";

  qty.setAttribute("aria-label","Quantity");
  qtyWrap.appendChild(mlQty); qtyWrap.appendChild(qty);

  // Tier
  const tierWrap = document.createElement("div");
  tierWrap.className = "field tier";
  const mlTier = document.createElement("span"); mlTier.className="m-label"; mlTier.textContent="Tier";
  const tierSel = buildTierSelect(+catSel.value, "Standard");
  tierWrap.appendChild(mlTier); tierWrap.appendChild(tierSel);

  // Unit price (editable rate; defaults to tier midpoint, override to dial exact)
  const rateField = document.createElement("div");
  rateField.className = "field rate";
  const mlRate = document.createElement("span"); mlRate.className="m-label"; mlRate.textContent="Unit Price";
  const rw = document.createElement("div");

  const cur = document.createElement("span"); cur.className="rate-cur"; cur.textContent="$";
  const rateInput = document.createElement("input");
  rateInput.type="number"; rateInput.min="0"; rateInput.step="1"; rateInput.className="rate-input";
  rateInput.setAttribute("aria-label","Unit price (editable)");
  const rUnit = document.createElement("span"); rUnit.className="rate-unit";
  const reset = document.createElement("button");
  reset.className="rate-reset"; reset.type="button";
  reset.innerHTML="&#8635;"; reset.title="Reset to tier midpoint";
  reset.setAttribute("aria-label","Reset to tier midpoint");
  rw.appendChild(cur); rw.appendChild(rateInput); rw.appendChild(rUnit); rw.appendChild(reset);
  rateField.appendChild(mlRate); rateField.appendChild(rw);

  // Subtotal
  const sub = document.createElement("div");
  sub.className="subtotal";
  sub.textContent="$0";

  // Remove
  const rm = document.createElement("button");
  rm.className="remove no-print";
  rm.innerHTML="&times;";
  rm.title="Remove line";
  rm.setAttribute("aria-label","Remove line");

  // Row (grid of controls)
  const row = document.createElement("div");
  row.className = "line-row";

  // Schematic thumbnail (leading)
  const thumb = document.createElement("div");
  thumb.className = "thumb";
  const thumbArt = document.createElement("span"); thumbArt.className = "thumb-art";
  const thumbX = document.createElement("span"); thumbX.className = "thumb-x";
  thumb.appendChild(thumbArt); thumb.appendChild(thumbX);

  row.appendChild(thumb);
  row.appendChild(catWrap);
  row.appendChild(qtyWrap);
  row.appendChild(tierWrap);
  row.appendChild(rateField);
  row.appendChild(sub);
  row.appendChild(rm);

  // Detail (what the selection includes)
  const detail = document.createElement("div");
  detail.className = "line-detail";

  // Construction toggle — Frameless / Inset (+12%), shown only for cabinet categories
  li.dataset.construction = "Frameless";
  const constrRow = document.createElement("div");
  constrRow.className = "ld-construction";
  constrRow.style.display = "none";
  const cLabel = document.createElement("span"); cLabel.className = "lc-label"; cLabel.textContent = "Construction";
  const seg = document.createElement("div"); seg.className = "seg";
  const bFrame = document.createElement("button"); bFrame.type = "button"; bFrame.className = "seg-btn active"; bFrame.textContent = "Frameless";
  const bInset = document.createElement("button"); bInset.type = "button"; bInset.className = "seg-btn"; bInset.textContent = "Inset";
  seg.appendChild(bFrame); seg.appendChild(bInset);
  constrRow.appendChild(cLabel); constrRow.appendChild(seg);

  // Size toggle — Standard / Tall / Oversized, shown only for door categories
  li.dataset.size = DOOR_SIZES[0];
  const sizeRow = document.createElement("div");
  sizeRow.className = "ld-construction ld-size";
  sizeRow.style.display = "none";
  const sLabel = document.createElement("span"); sLabel.className = "lc-label"; sLabel.textContent = "Size";
  const sSeg = document.createElement("div"); sSeg.className = "seg";
  const sizeBtns = {};
  DOOR_SIZES.forEach((sz,i)=>{
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "seg-btn" + (i===0 ? " active" : "");
    btn.textContent = sz;
    sizeBtns[sz] = btn;
    sSeg.appendChild(btn);
  });
  sizeRow.appendChild(sLabel); sizeRow.appendChild(sSeg);

  const dDesc = document.createElement("span"); dDesc.className = "ld-desc";
  const dTier = document.createElement("span"); dTier.className = "ld-tier";
  const dNote = document.createElement("span"); dNote.className = "ld-note"; dNote.style.display = "none";
  detail.appendChild(constrRow);
  detail.appendChild(sizeRow);
  detail.appendChild(dDesc);
  detail.appendChild(dTier);
  detail.appendChild(dNote);

  function setConstruction(val){
    li.dataset.construction = val;
    bFrame.classList.toggle("active", val === "Frameless");
    bInset.classList.toggle("active", val === "Inset");
    li.dataset.override = "0";   // recompute at the new construction
    recalcLine(li);
  }
  bFrame.addEventListener("click", ()=>setConstruction("Frameless"));
  bInset.addEventListener("click", ()=>setConstruction("Inset"));

  function setSize(val){
    li.dataset.size = val;
    DOOR_SIZES.forEach(sz=>sizeBtns[sz].classList.toggle("active", sz === val));
    li.dataset.override = "0";   // recompute at the new size
    recalcLine(li);
  }
  DOOR_SIZES.forEach(sz=>sizeBtns[sz].addEventListener("click", ()=>setSize(sz)));

  li.appendChild(row);
  li.appendChild(detail);

  // Events
  catSel.addEventListener("change", ()=>{
    const keep = tierSel.value;
    const newTier = buildTierSelect(+catSel.value, keep);
    tierSel.innerHTML = newTier.innerHTML;
    tierSel.value = newTier.value;
    li.dataset.override = "0";        // new category → back to tier average
    recalcLine(li);
  });
  qty.addEventListener("input", ()=>recalcLine(li));
  tierSel.addEventListener("change", ()=>{
    li.dataset.override = "0";        // new tier → back to tier average
    recalcLine(li);
  });
  rateInput.addEventListener("input", ()=>{
    li.dataset.override = "1";        // manual edit → exact override
    rw.classList.add("custom");
    recalcLine(li);
  });
  reset.addEventListener("click", ()=>{
    li.dataset.override = "0";        // snap back to tier midpoint
    recalcLine(li);
  });
  rm.addEventListener("click", ()=>{
    const setLines = li.closest(".set-lines");
    li.remove();
    if(setLines) refreshSetEmpty(setLines);
    ensureEmptyState();
    recalcTotals();
  });

  const inSet = target.classList && target.classList.contains("set-lines");
  if(inSet) removeSetEmpty(target); else removeEmptyState();
  target.appendChild(li);
  recalcLine(li);
}

/* ---------- Set empty-hint helpers ---------- */
function refreshSetEmpty(setLines){
  if(!setLines.querySelector(".line") && !setLines.querySelector(".set-empty")){
    const e = document.createElement("li");
    e.className = "set-empty";
    e.textContent = "Empty set — add the pieces that make up one unit.";
    setLines.appendChild(e);
  }
}
function removeSetEmpty(setLines){
  const e = setLines.querySelector(".set-empty");
  if(e) e.remove();
}

/* ---------- Recalc a single line ---------- */
function recalcLine(li){
  const catSel = li.querySelector(".cat-select");
  const tierSel = li.querySelector(".tier-select");
  const rateInput = li.querySelector(".rate-input");
  const rateWrap = li.querySelector(".rate-wrap");
  const qty = parseFloat(li.querySelector(".qty-input").value) || 0;
  const cat = CATEGORIES[+catSel.value];
  const tier = tierSel.value;
  const mid = cat.tiers[tier] || 0;
  const bu = bandUnit(cat.unit);
  const override = li.dataset.override === "1";

  // Construction: Inset runs a flat +12% over frameless (cabinet categories only)
  const constrRow = li.querySelector(".ld-construction");
  constrRow.style.display = cat.hasConstruction ? "" : "none";
  const isInset = cat.hasConstruction && li.dataset.construction === "Inset";
  const cMult = isInset ? INSET_UPCHARGE : 1;

  // Size: door categories get a size multiplier on top of the wood tier
  const sizeRow = li.querySelector(".ld-size");
  const isDoor = cat.group === "Doors";
  sizeRow.style.display = isDoor ? "" : "none";
  const sizeKey = li.dataset.size || DOOR_SIZES[0];
  const sMult = isDoor ? (SIZE_MULT[sizeKey] || 1) : 1;

  // Unit label inside the rate field
  li.querySelector(".rate-unit").textContent = rateUnitLabel(cat.unit);

  // Effective unit price:
  //   auto  → tier midpoint scaled by region and construction
  //   custom→ the exact figure typed; regional modifier is NOT re-applied
  const autoRate = mid * regionMod * cMult * sMult;
  let effRate;
  if(override){
    effRate = parseFloat(rateInput.value) || 0;
    rateWrap.classList.add("custom");
  } else {
    effRate = autoRate;
    rateWrap.classList.remove("custom");
    rateInput.value = Math.round(autoRate);
  }

  const subtotal = qty * effRate;
  li.querySelector(".subtotal").textContent = fmt(subtotal);
  li.dataset.subtotal = subtotal;

  // Schematic thumbnail (scales with inputs)
  li.querySelector(".thumb-art").innerHTML = buildThumbArt(cat, qty);
  li.querySelector(".thumb-x").textContent = (BADGE_UNITS[cat.unit] && qty > 1) ? "×" + Math.round(qty) : "";

  // --- Educational detail ---
  li.querySelector(".ld-desc").textContent = cat.desc || "";
  const def = tierDefFor(cat)[tier] || "";

  // Reference: sell band (where we have one) + the midpoint that drives the calc.
  const insetTag = isInset ? " · inset" : "";
  const sizeTag = isDoor ? " · " + (sizeKey === "Standard" ? STD_DOOR_SIZE : sizeKey.toLowerCase()) : "";
  let ref = "midpoint " + fmt(autoRate) + bu + " · " + regionMod.toFixed(2) + "×" + insetTag + sizeTag;
  if(cat.ranges && cat.ranges[tier]){
    const lo = cat.ranges[tier][0] * regionMod * cMult * sMult;
    const hi = cat.ranges[tier][1] * regionMod * cMult * sMult;
    ref = "Sell band " + fmt(lo) + "–" + fmt(hi) + bu + " · " + ref;
  }
  const customNote = override
    ? " <span class=\"ld-custom\">· custom rate " + fmt(effRate) + bu + " — modifier not applied</span>"
    : "";
  li.querySelector(".ld-tier").innerHTML =
    "<b>" + tier + "</b> — " + def
    + " <span class=\"ld-band\">" + ref + "</span>"
    + customNote;

  // Contextual note + signature-piece caution for Metalwork / Upholstery
  const noteEl = li.querySelector(".ld-note");
  const gnote = GROUP_NOTES[cat.group];
  if(gnote){
    let n = gnote;
    if((cat.group === "Metalwork" || cat.group === "Upholstery") && subtotal >= 50000){
      n += " <span class=\"ld-flag\">Signature-piece scale — get a specialty fabricator quote before quoting the client.</span>";
    }
    noteEl.innerHTML = n;
    noteEl.style.display = "";
  } else {
    noteEl.innerHTML = "";
    noteEl.style.display = "none";
  }

  recalcTotals();
}

/* ---------- Recalc all lines (e.g. region change) ---------- */
function recalcAll(){
  document.getElementById("modDisplay").textContent = regionMod.toFixed(2) + "×";
  linesEl.querySelectorAll(".line").forEach(recalcLine);
  recalcTotals();
}

/* ---------- Totals ---------- */
function recalcTotals(){
  let total = 0;

  // Ungrouped lines (direct children of #lines)
  linesEl.querySelectorAll(":scope > .line").forEach(li=>{
    total += parseFloat(li.dataset.subtotal) || 0;
  });

  // Sets: sum of their lines = price of one unit; × set qty = set total
  linesEl.querySelectorAll(":scope > .set").forEach(setEl=>{
    let perUnit = 0;
    setEl.querySelectorAll(".set-lines > .line").forEach(li=>{
      perUnit += parseFloat(li.dataset.subtotal) || 0;
    });
    const q = parseFloat(setEl.querySelector(".set-qty").value);
    const qty = (isNaN(q) ? 1 : q);
    const setTotal = perUnit * qty;
    setEl.querySelector(".set-unit-row").textContent =
      fmt(perUnit) + " per unit  ×  " + qty;
    setEl.querySelector(".set-subtotal").textContent = fmt(setTotal);
    total += setTotal;
  });

  document.getElementById("grandTotal").textContent = fmt(total);
}

/* ---------- Empty state ---------- */
function ensureEmptyState(){
  if(!linesEl.querySelector(".line") && !linesEl.querySelector(".set") && !linesEl.querySelector(".empty")){
    const e = document.createElement("li");
    e.className="empty";
    e.textContent="No line items yet. Select “+ Add Line” to begin an estimate.";
    linesEl.appendChild(e);
  }
}
function removeEmptyState(){
  const e = linesEl.querySelector(".empty");
  if(e) e.remove();
}

/* ---------- Add a set (grouped lines with a shared ×N multiplier) ---------- */
let setSeq = 0;
function addSet(){
  const n = ++setSeq;
  const set = document.createElement("li");
  set.className = "set";

  // Head: badge + editable name + ×qty + remove
  const head = document.createElement("div");
  head.className = "set-head";

  const badge = document.createElement("span");
  badge.className = "set-badge";
  badge.textContent = "Set";

  const name = document.createElement("input");
  name.className = "set-name";
  name.type = "text";
  name.value = "Set " + n;
  name.setAttribute("aria-label","Set name");

  const qw = document.createElement("div");
  qw.className = "set-qty-wrap";
  const mult = document.createElement("span"); mult.className="mult"; mult.textContent="×";
  const qty = document.createElement("input");
  qty.className = "set-qty";
  qty.type = "number"; qty.min = "0"; qty.step = "1"; qty.value = "1";
  qty.setAttribute("aria-label","Number of sets");
  const qlab = document.createElement("span"); qlab.textContent = "units";
  qw.appendChild(mult); qw.appendChild(qty); qw.appendChild(qlab);

  const rm = document.createElement("button");
  rm.className = "set-remove no-print";
  rm.innerHTML = "&times;";
  rm.title = "Remove set";
  rm.setAttribute("aria-label","Remove set");

  head.appendChild(badge);
  head.appendChild(name);
  head.appendChild(qw);
  head.appendChild(rm);

  // Body: lines belonging to this set
  const body = document.createElement("ul");
  body.className = "set-lines";

  // Foot: add-line-to-set + running totals
  const foot = document.createElement("div");
  foot.className = "set-foot";
  const addBtn = document.createElement("button");
  addBtn.className = "btn btn-ghost no-print";
  addBtn.textContent = "+ Add line to set";
  const totalBlock = document.createElement("div");
  totalBlock.className = "set-total-block";
  const unitRow = document.createElement("div"); unitRow.className = "set-unit-row"; unitRow.textContent = "$0 per unit  ×  1";
  const totalRow = document.createElement("div"); totalRow.className = "set-total-row";
  totalRow.innerHTML = "Set total <span class=\"set-subtotal\">$0</span>";
  totalBlock.appendChild(unitRow); totalBlock.appendChild(totalRow);
  foot.appendChild(addBtn);
  foot.appendChild(totalBlock);

  set.appendChild(head);
  set.appendChild(body);
  set.appendChild(foot);

  // Events
  qty.addEventListener("input", recalcTotals);
  addBtn.addEventListener("click", ()=>addLine(body));
  rm.addEventListener("click", ()=>{
    set.remove();
    ensureEmptyState();
    recalcTotals();
  });

  removeEmptyState();
  linesEl.appendChild(set);

  // Seed the set with one line so it's immediately usable
  addLine(body);
  recalcTotals();
  name.focus(); name.select();
}

/* ---------- Buttons ---------- */
document.getElementById("addLine").addEventListener("click", ()=>addLine(linesEl));
document.getElementById("addSet").addEventListener("click", addSet);

document.getElementById("clearAll").addEventListener("click", ()=>{
  linesEl.innerHTML="";
  ensureEmptyState();
  recalcTotals();
});

document.getElementById("printBtn").addEventListener("click", ()=>{
  const r = REGIONS[+regionSel.value];
  document.getElementById("print-region").textContent = r.name + "  ·  " + r.mod.toFixed(2) + "×";
  const d = new Date();
  document.getElementById("print-date").textContent = d.toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"});
  window.print();
});

/* ---------- Tier reference (built from the definition sets) ---------- */
(function buildTierRef(){
  const body = document.getElementById("tierRefBody");
  if(!body) return;
  const systems = [
    ["Base & wall cabinets — TFL economy, stepping up in laminate + hardware grade", TIER_DEF_CABINET],
    ["Millwork & FF&E — material steps up by tier", TIER_DEF_OPEN],
    ["Millwork, fixed material (painted, veneer, solid surface, quartz, stone, wood ceilings) — execution steps up", TIER_DEF_FIXED],
    ["Doors — tier steps by wood species (size adjusts on top)", TIER_DEF_DOOR],
    ["Metalwork", TIER_DEF_METAL],
    ["Upholstery", TIER_DEF_UPHOLSTERY]
  ];
  let html = "";
  systems.forEach(function(s){
    html += "<div class=\"tr-sys\"><div class=\"tr-title\">" + s[0] + "</div>";
    TIER_ORDER.forEach(function(t){
      if(s[1][t]) html += "<div class=\"tr-row\"><span class=\"tr-tier\">" + t + "</span><span class=\"tr-def\">" + s[1][t] + "</span></div>";
    });
    html += "</div>";
  });
  body.innerHTML = html;
})();

/* ---------- Init ---------- */
document.getElementById("modDisplay").textContent = regionMod.toFixed(2) + "×";
addLine();
</script>
</body>
